[tools]
node = "lts"

# ─── Setup ────────────────────────────────────────────────────────────────────

[tasks.install]
description = "Install all dependencies (run once after cloning)"
run = """
echo "→ Installing frontend dependencies..."
npm install

echo "✓ Done. Copy .env.example to .env and add your ANTHROPIC_API_KEY."
"""

# ─── Dev ──────────────────────────────────────────────────────────────────────

[tasks.dev]
description = "Start Next.js on :3000"
run = "npm run dev"
